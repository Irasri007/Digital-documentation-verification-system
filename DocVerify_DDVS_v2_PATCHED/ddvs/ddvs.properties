# ── HMAC secret key ──────────────────────────────────────────
# Used to sign and verify document credentials.
# CHANGE THIS to a long random string before deploying.
# Can also be set via environment variable: DDVS_HMAC_KEY
hmac.key=docverify-geu-2024-change-this-secret-key-before-use

# ── Issuer API keys ──────────────────────────────────────────
# Comma-separated list of API keys allowed to issue documents.
# When set, POST /api/issue requires header:  X-Api-Key: <key>
# Leave BLANK to disable auth (anyone can issue — for local testing only).
# Can also be set via environment variable: DDVS_ISSUER_API_KEYS
#
# Example with auth enabled:
# issuer.api.keys=GEU-ISSUER-KEY-2024,ANOTHER-ORG-KEY-9876
#
issuer.api.keys=

# ── Persistent data file ─────────────────────────────────────
# Path where issued documents and audit log are saved.
# Relative to the directory where you run the server (ddvs/).
# Can also be set via environment variable: DDVS_DATA_FILE
data.file=ddvs-data.json
